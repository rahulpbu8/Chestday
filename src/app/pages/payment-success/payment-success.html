<div class="success-container">
    <div class="success-card">
        <div class="icon-circle">
            <span class="material-symbols-outlined">check</span>
        </div>
        <h1 class="text-gradient">Payment Successful!</h1>
        <p>Welcome to the Chest Day family.</p>
        <div class="details">
            <p>Transaction ID: <strong>#{{transactionId}}</strong></p>
            <p>Amount Paid: <span>₹{{amount}}</span></p>
        </div>
        <div class="actions" style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
            <a routerLink="/" class="btn btn-outline" style="min-width: 150px;">HOME</a>
            <a routerLink="/profile" class="btn btn-primary" style="min-width: 150px;">VIEW PROFILE</a>
        </div>
    </div>
</div>
