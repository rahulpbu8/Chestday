<div class="product-form-container">
  <div class="form-card">
    <div class="header">
      <span class="material-symbols-outlined">
        {{ isEditMode ? 'edit_note' : 'add_shopping_cart' }}
      </span>
      <h2>{{ isEditMode ? 'Edit' : 'Add New' }} <span>Product</span></h2>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
      <div class="form-layout">
        <div class="image-upload-section">
          <div class="image-preview" [class.empty]="!imagePreview" (click)="fileInput.click()">
            @if (imagePreview) {
            <img [src]="imagePreview" alt="Preview">
            } @else {
            <span class="material-symbols-outlined">add_a_photo</span>
            <p>Click to upload image</p>
            }
          </div>
          <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" hidden>
          <p class="file-hint">Recommended size: 800x800px</p>
        </div>

        <div class="fields-section">
          <div class="form-group full">
            <label>Product Name</label>
            <input type="text" formControlName="name" placeholder="e.g. Whey Protein Isolate">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select formControlName="category">
                <option value="" disabled>Select Category</option>
                @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat }}</option>
                }
              </select>
            </div>
            <div class="form-group">
              <label>Price ($)</label>
              <input type="number" formControlName="price" placeholder="49.99">
            </div>
          </div>

          <div class="form-group">
            <label>Initial Stock</label>
            <input type="number" formControlName="stock" placeholder="50">
          </div>

          <div class="form-group full">
            <label>Description</label>
            <textarea formControlName="description" rows="4" placeholder="Enter product details..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="onCancel()" [disabled]="isLoading">CANCEL</button>
        <button type="submit" class="btn-primary" [disabled]="productForm.invalid || isLoading">
          @if (isLoading) {
          <span class="loader"></span>
          } @else {
          {{ isEditMode ? 'UPDATE PRODUCT' : 'SAVE PRODUCT' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
